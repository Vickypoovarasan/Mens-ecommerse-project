spring.application.name=ecommerse
server.port=9090

# MySQL (dev default)
spring.datasource.url=jdbc:mysql://localhost:3306/ecommerse?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.defer-datasource-initialization=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
logging.level.org.flywaydb=INFO

# --- Optional SMTP (leave spring.mail.host empty to keep console OTP logs) ---
# Gmail example: enable 2FA, create App Password, then set:
# spring.mail.host=smtp.gmail.com
# spring.mail.port=587
# spring.mail.username=your@gmail.com
# spring.mail.password=your-app-password
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USER:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_FROM:}
app.mail.enabled=${MAIL_ENABLED:false}

# Sandbox payment webhook (test: POST /api/payments/webhook/sandbox)
app.payment.webhook-secret=${PAYMENT_WEBHOOK_SECRET:local-dev-webhook-secret}
